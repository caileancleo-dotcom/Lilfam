<!-- FIREBASE INTEGRATION (MODULE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase Resmi
        const firebaseConfig = {
            apiKey: "AIzaSyCfWZHdVuJ9926lioDa5kJygK8hsFVqAcg",
            authDomain: "pixelmemo-fc51b.firebaseapp.com",
            projectId: "pixelmemo-fc51b",
            storageBucket: "pixelmemo-fc51b.firebasestorage.app",
            messagingSenderId: "491683226689",
            appId: "1:491683226689:web:a27f1bfe38460ee5f512c0"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'pixel-memories-app';

        let currentUser = null;
        let isAdmin = false;

        // Inisialisasi Auth
        window.addEventListener('load', async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Gagal inisialisasi autentikasi:", err);
            }
        });

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                listenToAdminData();
                listenToMemorandums();
            }
        });

        // --- SISTEM TOAST / NOTIFIKASI ---
        window.showToast = function(message) {
            const toast = document.getElementById('customToast');
            toast.innerText = message;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 4000);
        };

        // --- MANAJEMEN ADMIN MODE ---
        window.handleAdminToggle = function() {
            if (isAdmin) {
                isAdmin = false;
                updateAdminUI();
            } else {
                document.getElementById('passwordModal').classList.remove('hidden');
            }
        };

        window.submitAdminPassword = function() {
            const inputVal = document.getElementById('adminPassInput').value;
            if (inputVal === 'teman123') {
                isAdmin = true;
                document.getElementById('passwordModal').classList.add('hidden');
                updateAdminUI();
                showToast("Berhasil masuk sebagai Admin!");
            } else {
                showToast("Password salah!");
            }
        };

        function updateAdminUI() {
            const toggleBtn = document.getElementById('adminToggleBtn');
            const banner = document.getElementById('adminBanner');
            const inputs = document.querySelectorAll('.upload-input');
            const badges = document.querySelectorAll('.edit-badge');

            if (isAdmin) {
                toggleBtn.innerText = "🔑 ADMIN MODE: ON";
                banner.classList.remove('hidden');
                inputs.forEach(el => el.classList.remove('disabled'));
                badges.forEach(el => el.classList.remove('hidden'));
            } else {
                toggleBtn.innerText = "🔑 ADMIN MODE: OFF";
                banner.classList.add('hidden');
                inputs.forEach(el => el.classList.add('disabled'));
                badges.forEach(el => el.classList.add('hidden'));
            }
        }

        // --- SISTEM FOTO ---
        function compressAndConvertImage(file, maxWidth, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.uploadAdminPhoto = function(input, firestoreField, imgElementId, placeholderId) {
            if (!isAdmin) return;
            const file = input.files[0];
            if (!file) return;

            compressAndConvertImage(file, 400, async (base64Data) => {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config'), 
                    { [firestoreField]: base64Data }, { merge: true });
                    showToast("Foto berhasil diperbarui!");
                } catch (err) { showToast("Gagal menyimpan ke database."); }
            });
        };

        function listenToAdminData() {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config'), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    syncPhotoSlot(data.shipPhoto, 'main-ship-img', 'sail-text');
                    syncPhotoSlot(data.friend_is, 'img-is', 'text-is');
                    syncPhotoSlot(data.friend_mbg, 'img-mbg', 'text-mbg');
                    syncPhotoSlot(data.friend_vino, 'img-vino', 'text-vino');
                    syncPhotoSlot(data.friend_angel, 'img-angel', 'text-angel');
                    syncPhotoSlot(data.friend_ejajuk, 'img-ejajuk', 'text-ejajuk');
                    syncPhotoSlot(data.friend_bareng, 'img-bareng', 'text-bareng');
                }
            });
        }

        function syncPhotoSlot(base64Data, imgId, placeholderId) {
            const imgEl = document.getElementById(imgId);
            const textEl = document.getElementById(placeholderId);
            if (base64Data) {
                imgEl.src = base64Data;
                imgEl.classList.remove('hidden');
                if (textEl) textEl.classList.add('hidden');
            }
        }

        // --- SISTEM MEMORANDUM ---
        document.getElementById('memoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const textVal = document.getElementById('memoText').value.trim();
            const mediaFile = document.getElementById('memoMedia').files[0];

            const saveMemo = async (mediaBase64 = null, type = 'text') => {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'memorandums'), {
                    text: textVal, media: mediaBase64, mediaType: type, createdAt: Date.now()
                });
                document.getElementById('memoForm').reset();
                showToast("Pesan berhasil ditempel!");
            };

            if (mediaFile && mediaFile.type.startsWith('image/')) {
                compressAndConvertImage(mediaFile, 350, (base64) => saveMemo(base64, 'image'));
            } else {
                saveMemo();
            }
        });

        function listenToMemorandums() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'memorandums'), (snapshot) => {
                const board = document.getElementById('memoBoard');
                board.innerHTML = '';
                const items = [];
                snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                items.sort((a, b) => b.createdAt - a.createdAt);

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'memo-card p-4';
                    if (item.media) card.innerHTML += `<img src="${item.media}" class="memo-media mb-3">`;
                    card.innerHTML += `<div class="text-sm italic">"${item.text}"</div>`;
                    board.appendChild(card);
                });
            });
        }
                                </script>
