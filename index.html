<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Pixel Memories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- PASTE FIREBASE CONFIG KAMU DI SINI ---
        const firebaseConfig = {
            apiKey: "ISI_DI_SINI",
            authDomain: "ISI_DI_SINI",
            databaseURL: "ISI_DI_SINI",
            projectId: "ISI_DI_SINI",
            storageBucket: "ISI_DI_SINI",
            messagingSenderId: "ISI_DI_SINI",
            appId: "ISI_DI_SINI"
        };
        // ------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Fungsi Simpan & Ambil Data
        window.dbRef = db;
        window.ref = ref;
        window.set = set;
        window.onValue = onValue;
        window.push = push;
    </script>
    <style>
        /* (Copy kembali CSS milikmu di sini) */
    </style>
</head>
