<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Interactive Zen Garden 🌿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(to bottom, #09100d, #030504); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        /* Animasi Bunga Tumbuh Mekar */
        .flower-spawn {
            animation: growBloom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: bottom center;
        }
        @keyframes growBloom {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        /* Animasi Kelopak Gugur */
        .petal {
            position: absolute;
            pointer-events: none;
            animation: fall 4s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(150px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="text-emerald-100 min-h-screen relative select-none">

    <!-- Header & Petunjuk -->
    <div class="absolute top-8 left-0 right-0 z-10 text-center pointer-events-none">
        <h1 class="text-2xl font-light tracking-widest text-emerald-400/80 uppercase">The Shared Garden</h1>
        <p class="text-xs text-emerald-700/60 mt-1">Ketuk atau klik di mana saja untuk menumbuhkan bunga</p>
    </div>

    <!-- Kanvas Utama Tempat Menanam (Klik di Sini) -->
    <div id="garden-canvas" class="w-full h-screen absolute inset-0 cursor-pointer"></div>

    <!-- Watermark Geng di Bagian Bawah -->
    <div class="absolute bottom-6 left-0 right-0 text-center pointer-events-none z-10">
        <p class="text-[10px] tracking-widest text-emerald-900 uppercase font-semibold">
            Is • Mbg • Vino • Angel • Ejajuk
        </p>
        <button onclick="bersihkanTaman(event)" class="pointer-events-auto mt-2 text-[10px] bg-emerald-950/40 hover:bg-emerald-900/40 border border-emerald-900/30 text-emerald-600 px-3 py-1 rounded-full transition-colors">
            Bersihkan Taman
        </button>
    </div>

    <script>
        const canvas = document.getElementById('garden-canvas');
        const jenisBunga = ['🌸', '🌷', '🌻', '🪻', '🌼', '🌹', '🌿', '🌱'];
        const jenisKelopak = ['🌸', '✨', '🍃', '💮'];

        // Efek interaktif saat layar diklik / disentuh
        canvas.addEventListener('click', (e) => {
            // Ambil posisi koordinat klik mouse
            const x = e.clientX;
            const y = e.clientY;

            // 1. Munculkan Bunga Baru
            const bungaAcak = jenisBunga[Math.floor(Math.random() * jenisBunga.length)];
            const elemenBunga = document.createElement('div');
            
            elemenBunga.className = 'flower-spawn absolute text-4xl sm:text-5xl';
            // Posisikan tepat di tengah ujung bawah emoji bunga
            elemenBunga.style.left = `${x - 24}px`;
            elemenBunga.style.top = `${y - 40}px`;
            elemenBunga.innerText = bungaAcak;

            canvas.appendChild(elemenBunga);

            // 2. Munculkan Efek Kelopak Gugur di Sekitarnya
            for (let i = 0; i < 3; i++) {
                createPetal(x, y);
            }
        });

        // Fungsi membuat kelopak bunga berguguran
        function createPetal(startX, startY) {
            const kelopakAcak = jenisKelopak[Math.floor(Math.random() * jenisKelopak.length)];
            const elemenKelopak = document.createElement('div');
            
            elemenKelopak.className = 'petal text-sm opacity-0';
            elemenKelopak.innerText = kelopakAcak;
            
            // Variasi posisi jatuh acak
            const jangkauanX = (Math.random() - 0.5) * 60; 
            elemenKelopak.style.left = `${startX + jangkauanX}px`;
            elemenKelopak.style.top = `${startY - 10}px`;
            
            canvas.appendChild(elemenKelopak);

            // Hapus elemen kelopak setelah animasinya selesai biar ga berat
            setTimeout(() => {
                elemenKelopak.remove();
            }, 4000);
        }

        // Fungsi tombol reset untuk mengosongkan taman kembali
        function bersihkanTaman(e) {
            e.stopPropagation(); // Mencegah klik tombol malah memicu numbuhin bunga baru
            canvas.innerHTML = '';
        }
    </script>
</body>
</html>
