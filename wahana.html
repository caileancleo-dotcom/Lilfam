<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memory Garden 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0c120c; font-family: 'Georgia', serif; }
        .tree-container { position: relative; width: 300px; height: 350px; margin: auto; }
        .fruit-photo { 
            position: absolute; width: 60px; height: 60px; border-radius: 50%; 
            border: 3px solid #f0fdf4; cursor: pointer; transition: transform 0.3s;
            background-size: cover; background-position: center;
        }
        .fruit-photo:hover { transform: scale(1.2) rotate(5deg); z-index: 10; }
        .flower-bed { transition: opacity 0.3s; }
        .flower-bed:hover { opacity: 0.7; cursor: help; }
    </style>
</head>
<body class="text-green-100 min-h-screen p-8">

    <div class="max-w-3xl mx-auto text-center">
        <h1 class="text-4xl italic text-green-300 mb-2">The Garden of Memories</h1>
        <p class="text-green-600 mb-12">Tempat di mana momen berlima kita tumbuh abadi.</p>

        <!-- POHON MEMORI -->
        <div class="tree-container mb-20">
            <!-- Batang Pohon (Visual) -->
            <div class="absolute bottom-0 left-1/2 -ml-4 w-8 h-64 bg-amber-900 rounded-t-lg"></div>
            <div class="absolute bottom-60 left-1/2 -ml-20 w-40 h-40 bg-green-800 rounded-full"></div>
            
            <!-- BUAH FOTO (Admin bisa ganti URL fotonya di bawah) -->
            <div class="fruit-photo" style="top: 20px; left: 40px; background-image: url('https://via.placeholder.com/150');" title="Momen Is"></div>
            <div class="fruit-photo" style="top: 10px; right: 40px; background-image: url('https://via.placeholder.com/150');" title="Momen Mbg"></div>
            <div class="fruit-photo" style="top: 80px; left: 10px; background-image: url('https://via.placeholder.com/150');" title="Momen Vino"></div>
            <div class="fruit-photo" style="top: 80px; right: 10px; background-image: url('https://via.placeholder.com/150');" title="Momen Angel"></div>
            <div class="fruit-photo" style="top: 140px; left: 120px; background-image: url('https://via.placeholder.com/150');" title="Momen Ejajuk"></div>
        </div>

        <!-- PETAK BUNGA -->
        <div class="grid grid-cols-5 gap-4">
            <div class="flower-bed" title="Is: Selalu tenang kayak bunga matahari">🌻 <p class="text-xs">Is</p></div>
            <div class="flower-bed" title="Mbg: Anggun tapi berduri">🌹 <p class="text-xs">Mbg</p></div>
            <div class="flower-bed" title="Vino: Tumbuh di mana saja">🍀 <p class="text-xs">Vino</p></div>
            <div class="flower-bed" title="Angel: Lembut dan menenangkan">🌸 <p class="text-xs">Angel</p></div>
            <div class="flower-bed" title="Ejajuk: Unik dan beda sendiri">✨ <p class="text-xs">Ejajuk</p></div>
        </div>

        <div class="mt-16 text-xs text-green-800">
            *Admin: Ganti link 'https://via.placeholder.com/150' di kode untuk update foto buah.*
        </div>
    </div>
</body>
</html>
